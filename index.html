<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >

    <title>Cordelli Realty</title>

    <link
        rel="icon"
        type="image/png"
        href="https://raw.githubusercontent.com/JakeCordelli/cordellirealty/main/favIcon.png"
    >

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
            background: #f7f7f8;
            color: #28282d;
            font-family: -apple-system, BlinkMacSystemFont, "Inter",
                "Segoe UI", Roboto, sans-serif;
            font-weight: 300;
            letter-spacing: 0.15rem;
            text-align: center;
            overflow-x: hidden;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding:
                max(12px, env(safe-area-inset-top))
                12px
                max(12px, env(safe-area-inset-bottom));
        }

        body::-webkit-scrollbar {
            display: none;
        }

        @keyframes stealthEntry {
            0% {
                opacity: 0;
                transform: translateY(8px);
                filter: blur(4px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
        }

        .interface {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: calc(100% - 16px);
            max-width: 360px;
            padding: 14px 8px;
            animation: stealthEntry 1.2s cubic-bezier(0.22, 1, 0.36, 1)
                forwards;
        }

        .portrait-frame {
            width: 155px;
            height: 155px;
            margin: 0 auto 8px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(40, 40, 45, 0.12);
            background: #f7f7f8;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
        }

        header h1 {
            color: #28282d;
            font-size: clamp(1.15rem, 5.3vw, 1.35rem);
            font-weight: 300;
            line-height: 1.15;
            letter-spacing: clamp(0.28rem, 1.5vw, 0.44rem);
            margin-bottom: 9px;
            white-space: nowrap;
        }

        .credential {
            color: #28282d;
            font-size: clamp(0.72rem, 3.35vw, 0.82rem);
            line-height: 1.35;
            letter-spacing: clamp(0.035rem, 0.32vw, 0.08rem);
            white-space: nowrap;
        }

        .divider {
            width: 110px;
            height: 2px;
            margin: 11px auto 8px;
            background: rgb(64 142 255 / 50%);
        }

        .contact-buttons {
            display: flex;
            flex-direction: column;
            align-self: center;
            gap: 9px;
            width: max-content;
            max-width: calc(100vw - 32px);
            margin: 13px auto 8px;
        }

        .contact-link {
            width: 100%;
            min-width: 100%;
            min-height: 39px;
            padding: 9px 18px;
            border: 1px solid rgba(40, 40, 45, 0.16);
            border-radius: 40px;
            background: rgba(40, 40, 45, 0.02);
            color: #28282d;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 300;
            line-height: 1.15;
            transition: all 0.35s ease;
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
        }

        .contact-link:hover,
        .contact-link:active {
            color: #28282d;
            border-color: rgba(40, 40, 45, 0.32);
            background: rgba(40, 40, 45, 0.05);
        }

        .link-icon {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: block;
            object-fit: contain;
        }

        .technical-data {
            color: #28282d;
            font-size: 0.77rem;
            font-weight: 300;
            line-height: 1.55;
            letter-spacing: 0.06rem;
            opacity: 0.5;
            margin-top: 7px;
            white-space: nowrap;
        }

        #current-date {
            color: inherit;
        }

        /* Slightly compressed layout for shorter mobile screens */
        @media (max-height: 750px) {
            body {
                align-items: center;
                padding-top: max(10px, env(safe-area-inset-top));
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }

            .interface {
                gap: 7px;
                padding-top: 8px;
                padding-bottom: 8px;
            }

            .portrait-frame {
                width: 140px;
                height: 140px;
                margin-bottom: 7px;
            }

            header h1 {
                font-size: 1.25rem;
                margin-bottom: 5px;
            }

            .credential {
                font-size: 0.76rem;
                line-height: 1.28;
            }

            .divider {
                margin: 8px auto 6px;
            }

            .contact-buttons {
                gap: 8px;
                margin: 10px 0 6px;
            }

            .contact-link {
                min-height: 37px;
                padding: 8px 16px;
                font-size: 0.73rem;
            }

            .technical-data {
                font-size: 0.71rem;
                line-height: 1.45;
            }
        }

        /* Extra compression only for very short screens */
        @media (max-height: 620px) {
            body {
                align-items: center;
            }

            .interface {
                gap: 6px;
                padding-top: 6px;
                padding-bottom: 6px;
            }

            .portrait-frame {
                width: 115px;
                height: 115px;
            }

            header h1 {
                font-size: 1.12rem;
                letter-spacing: 0.38rem;
            }

            .credential {
                font-size: 0.68rem;
            }

            .divider {
                width: 100px;
                margin: 5px auto 3px;
            }

            .contact-buttons {
                gap: 6px;
                margin: 6px 0 3px;
            }

            .contact-link {
                min-height: 34px;
                padding: 7px 14px;
                font-size: 0.72rem;
            }

            .link-icon {
                width: 14px;
                height: 14px;
            }

            .technical-data {
                font-size: 0.63rem;
                line-height: 1.35;
            }
        }
    </style>
</head>

<body>
    <main class="interface">
        <div class="portrait-frame">
            <img
                src="https://raw.githubusercontent.com/JakeCordelli/cordellirealty/main/me.png"
                alt="Jake Cordelli"
            >
        </div>

        <header>
            <h1>Cordelli Realty</h1>

        <div class="contact-buttons">

            <a

                    <path

                    <path

                    />
                    <path

                    />
                </svg>

                Google
            </a>
        </div>

        <div class="technical-data">
            REB#: 0793614<br>
            Established in 2021<br>
            Page Updated: <span id="current-date"></span><br>
            282 Main Street, Wethersfield, CT
        </div>
    </main>

    <script>
        const options = {
            year: "numeric",
            month: "long",
            day: "numeric"
        };

        document.getElementById("current-date").textContent =
            new Date().toLocaleDateString(undefined, options);
    </script>
</body>
</html>
