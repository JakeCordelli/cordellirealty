<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cordelli Realty</title>
    <style>
        /* Base Architecture */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body, html {
            height: 100%;
            background: #fff;
            color: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            font-weight: 300; 
            letter-spacing: 0.15rem;
            text-align: center;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Entrance Animation */
        @keyframes stealthEntry {
            0% { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            100% { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .interface {
            display: flex;
            flex-direction: column;
            gap: 12px; 
            max-width: 300px; 
            width: 100%;
            padding: 20px;
            animation: stealthEntry 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* Professional Monochrome Portrait - Enlarged */
        .portrait-frame {
            width: 170px; /* Increased size from 85px */
            height: 170px; /* Increased size from 85px */
            margin: 0 auto 20px auto; /* Increased bottom margin for better spacing */
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
            background: #f9f9f9;
            /* Force grayscale to match the aesthetic */
            filter: grayscale(0%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 300;
            color: #000;
            margin-bottom: 2px;
            letter-spacing: 0.5rem;
        }

        .credential {
            font-size: 0.8rem;
            color: #000;
            line-height: 1.4;
            letter-spacing: 0.12rem;
            opacity: 1;
        }

        .contact-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 15px 0;
        }

        .contact-link {
            color: #000;
            text-decoration: none;
            font-weight: 300;
            font-size: 0.8rem;
            border: 1px solid rgba(0,0,0,0.15); 
            padding: 12px 20px;
            display: block;
            width: 100%;
            transition: all 0.5s ease;
            border-radius: 40px; 
            background: rgba(255,255,255,0.02);
            -webkit-tap-highlight-color: transparent;
        }

        .contact-link:active, .contact-link:hover {
            border-color: rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.02);
        }
        
        /* The Signature Blue Divider */
        .divider {
            width: 120px;
            height: 2px;
            margin: 12px auto;
            background: rgb(64 142 255 / 50%);
        }

        .technical-data {
            font-size: 0.8rem;
            font-weight: 300;
            color: #000; 
            line-height: 1.8;
            letter-spacing: 0.08rem;
            opacity: .5;
        }

        #current-date {
            color: inherit;
        }

    </style>
</head>
<body>

    <div class="interface">
        <div class="portrait-frame">
            <img src="https://raw.githubusercontent.com/JakeCordelli/cordellirealty/main/me.png" alt="Jake Cordelli">
        </div>

        <header>
            <h1>Cordelli Realty</h1>
            <div class="divider"></div>
        </header>

        <div class="credential">Founded by Jake Cordelli</div>
        <div class="credential">Connecticut Real Estate Broker</div>

        <div class="contact-buttons">
            <a href="tel:2038564317" class="contact-link">203.856.4317</a>
            <a href="mailto:Jake@CordelliRealty.com" class="contact-link">Jake@CordelliRealty.com</a>
        </div>
        
        <div class="technical-data">
            282 Main Street, Wethersfield, CT <br> 
            REB#: 0793614 <br>
            Page Updated: <span id="current-date"></span>
        </div>
    </div>

    <script>
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('current-date').textContent = new Date().toLocaleDateString(undefined, options);
    </script>

</body>
</html>
